name: CI Workflow
on:
  push:
    branches:
      - main
  pull_request: {}
jobs:
  test:
    uses: .github/workflows/shared-workflow.yml
    with:
      name: Test
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 1
      - name: Build
        run: npm run build
